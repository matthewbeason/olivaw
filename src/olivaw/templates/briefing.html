{% extends "base.html" %}
{% block content %}
  <h1>Source Briefing</h1>
  <p>Deterministic briefing generated from registered sources.</p>

  <section class="card">
    <h2>Attribution</h2>
    <dl>
      <dt>State</dt><dd>{{ briefing.attribution.value }}</dd>
      <dt>Sources</dt><dd>{{ briefing.sources | join(", ") }}</dd>
    </dl>
  </section>

  <h2>Briefing</h2>
  <pre>{{ briefing.text }}</pre>
{% endblock %}
