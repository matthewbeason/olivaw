<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Olivaw</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f100f;
        --ink: #f2f4ef;
        --muted: #a6ada2;
        --line: rgba(224, 232, 214, 0.17);
        --panel: #171a16;
        --soft-panel: #20261f;
        --accent: #8bc6b7;
        --green: #34c759;
        --orange: #ff9500;
        --purple: #af52de;
        --teal: #30b0c7;
        --warn: #ff8a63;
        --shadow: rgba(0, 0, 0, 0.28);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, rgba(139, 198, 183, 0.18), transparent 30rem),
          linear-gradient(135deg, #0f100f 0%, #151712 48%, #10120f 100%);
        color: var(--ink);
        line-height: 1.45;
      }
      header {
        border-right: 1px solid var(--line);
        background: rgba(15, 16, 15, 0.9);
        backdrop-filter: blur(18px);
        bottom: 0;
        left: 0;
        position: fixed;
        top: 0;
        width: 216px;
        z-index: 1;
      }
      nav {
        min-height: 100vh;
        padding: 24px 18px;
      }
      nav, .nav-primary, .nav-secondary {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      nav strong {
        color: var(--ink);
        display: block;
        font-size: 18px;
        letter-spacing: 0;
        margin-bottom: 8px;
      }
      .nav-kicker {
        color: var(--muted);
        display: block;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.04em;
        margin-bottom: 18px;
        text-transform: uppercase;
      }
      nav a {
        border-radius: 8px;
        color: var(--muted);
        font-weight: 650;
        padding: 9px 10px;
      }
      nav a:hover {
        background: rgba(139, 198, 183, 0.12);
        color: var(--ink);
        text-decoration: none;
      }
      nav a.active {
        background: rgba(139, 198, 183, 0.18);
        color: var(--ink);
      }
      .nav-secondary {
        border-top: 1px solid var(--line);
        margin-top: 18px;
        padding-top: 18px;
      }
      .nav-secondary a {
        font-size: 13px;
        font-weight: 600;
      }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      main {
        margin-left: 216px;
        padding: 32px 32px 56px;
        width: min(1480px, calc(100vw - 216px));
      }
      h1 {
        font-size: clamp(34px, 5vw, 54px);
        line-height: 1.04;
        margin: 0 0 10px;
        letter-spacing: 0;
      }
      h2 {
        font-size: 21px;
        line-height: 1.2;
        margin: 0 0 12px;
        letter-spacing: 0;
      }
      p { color: var(--muted); margin-top: 0; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 16px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }
      .source-grid {
        grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      }
      .source-output {
        margin-top: 12px;
      }
      code {
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .status {
        display: inline-block;
        border-radius: 999px;
        border: 1px solid var(--line);
        padding: 3px 9px;
        font-size: 13px;
      }
      .available { color: var(--accent); }
      .unavailable, .disabled { color: var(--warn); }
      pre {
        white-space: pre-wrap;
        background: #070b10;
        color: #f5f5f7;
        border-radius: 8px;
        padding: 16px;
        overflow: auto;
        font-size: 13px;
        line-height: 1.55;
      }
      label { display: block; font-weight: 600; margin-bottom: 8px; }
      textarea {
        width: 100%;
        min-height: 140px;
        padding: 12px;
        background: var(--soft-panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--ink);
        font: inherit;
      }
      button {
        margin-top: 10px;
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: white;
        padding: 10px 14px;
        font: inherit;
        font-weight: 650;
        cursor: pointer;
      }
      dl { display: grid; grid-template-columns: max-content 1fr; gap: 8px 14px; }
      dt { color: var(--muted); }
      dd { margin: 0; overflow-wrap: anywhere; }
      .briefing-hero {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        align-items: flex-end;
        margin-bottom: 20px;
      }
      .eyebrow, .card-label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0;
        margin-bottom: 6px;
        text-transform: uppercase;
      }
      .lede {
        max-width: 620px;
        font-size: 18px;
        margin-bottom: 0;
      }
      .summary-card, .briefing-card, .disclosure-card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 12px 30px var(--shadow);
      }
      .summary-card {
        display: grid;
        grid-template-columns: minmax(180px, 0.7fr) minmax(0, 1.3fr);
        gap: 20px;
        align-items: center;
        padding: 22px;
        margin-bottom: 16px;
      }
      .summary-card h2 { font-size: 28px; margin: 8px 0 0; }
      .status-pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 750;
        padding: 5px 11px;
      }
      .status-healthy {
        background: rgba(52, 199, 89, 0.14);
        color: #7ee69c;
      }
      .status-watch {
        background: rgba(255, 149, 0, 0.16);
        color: #ffc56f;
      }
      .status-action {
        background: rgba(194, 65, 12, 0.13);
        color: var(--warn);
      }
      .status-explanation {
        max-width: 420px;
        margin: 8px 0 0;
      }
      .summary-meta {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }
      .summary-meta div {
        background: var(--soft-panel);
        border-radius: 8px;
        padding: 12px;
      }
      .summary-meta dt, .detail-list dt {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }
      .summary-meta dd {
        font-weight: 650;
        margin-top: 3px;
      }
      .assessment-panel {
        display: grid;
        grid-template-columns: minmax(0, 1.35fr) minmax(260px, 0.65fr);
        gap: 16px;
        margin-bottom: 18px;
      }
      .assessment-primary,
      .assessment-action,
      .briefing-section {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 12px 30px var(--shadow);
      }
      .assessment-primary,
      .assessment-action {
        padding: 20px;
      }
      .assessment-primary h2 {
        font-size: 30px;
        margin: 10px 0 8px;
      }
      .assessment-primary p {
        color: var(--ink);
        font-size: 17px;
        margin: 0;
        max-width: 720px;
      }
      .health-review-panel {
        border-left: 4px solid var(--teal);
        background: rgba(48, 176, 199, 0.09);
      }
      .generated-review {
        color: var(--ink);
        font-size: 17px;
        line-height: 1.5;
        margin: 0;
      }
      .action-copy {
        color: var(--ink);
        font-size: 19px;
        font-weight: 650;
        line-height: 1.4;
        margin: 0;
      }
      .briefing-flow {
        display: grid;
        gap: 16px;
      }
      .briefing-section {
        padding: 20px;
      }
      .section-heading {
        align-items: baseline;
        border-bottom: 1px solid var(--line);
        display: flex;
        flex-wrap: wrap;
        gap: 8px 14px;
        justify-content: space-between;
        margin-bottom: 14px;
        padding-bottom: 10px;
      }
      .section-heading h2,
      .section-heading .card-label {
        margin-bottom: 0;
      }
      .priority-list {
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }
      .briefing-subhead {
        font-size: 15px;
        line-height: 1.25;
        margin: 14px 0 8px;
        letter-spacing: 0;
      }
      .action-list + .briefing-subhead {
        margin-top: 18px;
      }
      .action-list li span {
        color: var(--muted);
        display: block;
        font-size: 13px;
        margin-top: 2px;
      }
      .action-list li .unavailable-action {
        color: var(--ink);
        font-size: inherit;
        font-weight: 650;
      }
      .action-list li .action-helper {
        color: #ffc56f;
      }
      .compact-action-list {
        margin-top: 12px;
      }
      .explanation-meta {
        margin-bottom: 4px;
      }
      .detail-event {
        margin: 0 18px 18px;
      }
      .details-copy {
        margin: 0 18px 18px;
      }
      .nested-detail {
        margin: 0 18px 18px;
      }
      .briefing-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 16px;
      }
      .briefing-card {
        grid-column: span 3;
        min-height: 220px;
        padding: 20px;
        position: relative;
        overflow: hidden;
      }
      .briefing-card:first-child { grid-column: span 4; }
      .briefing-card:nth-child(2) { grid-column: span 2; }
      .briefing-card::before {
        content: "";
        display: block;
        width: 42px;
        height: 5px;
        border-radius: 999px;
        background: var(--accent);
        margin-bottom: 18px;
      }
      .accent-green::before { background: var(--green); }
      .accent-blue::before { background: var(--accent); }
      .accent-teal::before { background: var(--teal); }
      .accent-orange::before { background: var(--orange); }
      .accent-purple::before { background: var(--purple); }
      .accent-red::before { background: var(--warn); }
      .category-chip {
        display: inline-flex;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 650;
        margin-bottom: 14px;
        padding: 4px 9px;
      }
      .clean-list {
        display: grid;
        gap: 10px;
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .clean-list li {
        color: var(--ink);
        overflow-wrap: anywhere;
      }
      .clean-list li::before {
        content: "";
        display: inline-block;
        width: 7px;
        height: 7px;
        margin-right: 8px;
        border-radius: 50%;
        background: var(--line);
        vertical-align: 1px;
      }
      .card-copy {
        color: var(--ink);
        font-size: 17px;
        line-height: 1.5;
      }
      .event-card {
        grid-column: span 6;
      }
      .event-item {
        border-top: 1px solid var(--line);
        padding-top: 14px;
      }
      .event-item + .event-item {
        margin-top: 16px;
      }
      .event-item h3 {
        font-size: 18px;
        line-height: 1.3;
        margin: 0 0 12px;
        letter-spacing: 0;
      }
      .event-meta {
        display: grid;
        grid-template-columns: minmax(130px, max-content) minmax(0, 1fr);
        gap: 8px 12px;
      }
      .event-meta dt {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }
      .event-meta dd {
        color: var(--ink);
        font-weight: 500;
      }
      .attribution-triad {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin: 0 0 14px;
      }
      .attribution-triad div {
        background: var(--soft-panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
      }
      .attribution-triad dt {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }
      .attribution-triad dd {
        color: var(--ink);
        font-weight: 650;
        margin-top: 2px;
      }
      .details-stack {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }
      .inline-details {
        border-top: 1px solid var(--line);
        margin-top: 16px;
        padding-top: 12px;
      }
      .inline-details summary {
        color: var(--accent);
        cursor: pointer;
        font-weight: 700;
      }
      .detail-items {
        margin-top: 12px;
        padding: 0 18px 18px;
      }
      .detail-list-body {
        padding: 0 18px 18px;
      }
      .disclosure-footnote {
        padding: 0 18px 18px;
      }
      .disclosure-subhead {
        padding: 0 18px;
      }
      .source-footnote {
        color: var(--muted);
        font-size: 13px;
        margin: 12px 0 0;
      }
      .inline-refresh {
        margin-top: 12px;
      }
      .disclosure-card {
        padding: 0;
        overflow: hidden;
      }
      .disclosure-card summary {
        cursor: pointer;
        font-weight: 700;
        padding: 16px 18px;
      }
      .disclosure-card pre {
        margin: 0 16px 16px;
      }
      .detail-list {
        display: grid;
        grid-template-columns: minmax(110px, max-content) 1fr;
        gap: 10px 14px;
        padding: 0 18px 18px;
      }
      .ops-shell {
        display: grid;
        gap: 18px;
      }
      .ops-hero {
        display: grid;
        grid-template-columns: minmax(0, 1.25fr) minmax(300px, 0.75fr);
        gap: 18px;
      }
      .attention-hero {
        background:
          linear-gradient(135deg, rgba(139, 198, 183, 0.22), transparent 52%),
          var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 18px 42px var(--shadow);
        min-height: 280px;
        padding: 24px;
      }
      .attention-hero h1 {
        max-width: 780px;
      }
      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 22px;
      }
      .button-link,
      .prompt-chip {
        align-items: center;
        background: rgba(139, 198, 183, 0.13);
        border: 1px solid rgba(139, 198, 183, 0.3);
        border-radius: 8px;
        color: var(--ink);
        display: inline-flex;
        font-size: 14px;
        font-weight: 750;
        min-height: 38px;
        padding: 8px 11px;
      }
      .button-link:hover,
      .prompt-chip:hover {
        background: rgba(139, 198, 183, 0.22);
        text-decoration: none;
      }
      .ops-card {
        background: rgba(23, 26, 22, 0.93);
        border: 1px solid var(--line);
        border-radius: 8px;
        box-shadow: 0 14px 34px var(--shadow);
        padding: 18px;
      }
      .ops-card h2 {
        font-size: 18px;
      }
      .ops-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 340px;
        gap: 18px;
      }
      .ops-main,
      .ops-side {
        display: grid;
        gap: 18px;
      }
      .context-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
        gap: 12px;
      }
      .mini-card {
        background: var(--soft-panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        min-height: 132px;
        padding: 14px;
      }
      .mini-card h3,
      .timeline-title {
        font-size: 15px;
        line-height: 1.3;
        margin: 0 0 8px;
      }
      .mini-card p {
        color: var(--ink);
        margin-bottom: 10px;
      }
      .meta-text {
        color: var(--muted);
        font-size: 13px;
        margin: 0;
      }
      .tone-healthy { border-color: rgba(52, 199, 89, 0.38); }
      .tone-watch { border-color: rgba(255, 149, 0, 0.45); }
      .tone-action, .tone-error, .tone-unavailable { border-color: rgba(255, 138, 99, 0.48); }
      .tone-weather { border-color: rgba(48, 176, 199, 0.42); }
      .tone-muted, .tone-disabled { border-color: var(--line); }
      .timeline {
        display: grid;
        gap: 12px;
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .timeline li {
        border-left: 2px solid rgba(139, 198, 183, 0.4);
        padding-left: 12px;
      }
      .freshness-list {
        display: grid;
        gap: 9px;
        margin: 0;
        padding: 0;
      }
      .freshness-row {
        align-items: center;
        display: grid;
        grid-template-columns: minmax(100px, 1fr) auto;
        gap: 10px;
      }
      .freshness-row dd {
        grid-column: 1 / -1;
      }
      .status-chip {
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--ink);
        font-size: 12px;
        font-weight: 750;
        padding: 3px 8px;
      }
      .signal-list {
        display: grid;
        gap: 10px;
        margin: 16px 0;
      }
      .signal-list div {
        border-top: 1px solid var(--line);
        display: grid;
        gap: 4px;
        grid-template-columns: minmax(120px, 0.4fr) minmax(0, 1fr);
        padding-top: 10px;
      }
      .signal-list dt {
        color: var(--muted);
        font-size: 12px;
        font-weight: 750;
        text-transform: uppercase;
      }
      .signal-list dd {
        color: var(--ink);
        font-weight: 650;
      }
      .compact-link {
        margin-top: 2px;
      }
      .prompt-list {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      .operator-actions {
        display: grid;
        gap: 12px;
      }
      .operator-actions form {
        border-bottom: 1px solid var(--line);
        padding-bottom: 12px;
      }
      .operator-actions form:last-child {
        border-bottom: 0;
        padding-bottom: 0;
      }
      .operator-actions button {
        margin-top: 0;
        width: 100%;
      }
      .operator-actions .meta-text,
      .operator-actions .action-helper {
        margin-top: 7px;
      }
      .action-helper {
        color: #ffc56f;
        font-size: 13px;
        margin-bottom: 0;
      }
      .action-result {
        border: 1px solid var(--line);
        border-radius: 8px;
        margin-top: 14px;
        padding: 12px;
      }
      .action-result p {
        margin-bottom: 8px;
      }
      .action-source-list {
        display: grid;
        gap: 8px;
        grid-template-columns: 1fr;
        margin: 12px 0 0;
      }
      .action-source-list div {
        display: grid;
        gap: 2px;
      }
      .action-source-list dt {
        color: var(--muted);
        font-size: 12px;
        font-weight: 750;
        text-transform: uppercase;
      }
      .action-source-list dd {
        color: var(--ink);
        font-size: 13px;
      }
      .chat-shell {
        display: grid;
        gap: 18px;
        max-width: 920px;
      }
      .chat-form {
        display: grid;
        gap: 12px;
      }
      .chat-form textarea {
        min-height: 140px;
      }
      .chat-response,
      .action-suggestion-card {
        display: grid;
        gap: 12px;
      }
      .chat-response pre {
        background: rgba(11, 15, 12, 0.72);
        border: 1px solid var(--line);
        border-radius: 8px;
        color: var(--ink);
        margin: 0;
        overflow-x: auto;
        padding: 14px;
        white-space: pre-wrap;
      }
      .action-suggestion-meta {
        margin: 0;
      }
      .chat-actions-panel {
        margin-top: 4px;
      }
      .assistant-shell {
        align-items: start;
        display: grid;
        gap: 22px;
        grid-template-columns: minmax(0, 1fr) 320px;
      }
      .assistant-main {
        display: grid;
        gap: 18px;
      }
      .assistant-hero {
        max-width: 720px;
        padding-top: 8px;
      }
      .assistant-intro {
        color: var(--ink);
        font-size: clamp(20px, 2.4vw, 28px);
        line-height: 1.2;
        margin-bottom: 0;
      }
      .conversation-panel {
        background:
          linear-gradient(180deg, rgba(139, 198, 183, 0.08), rgba(23, 26, 22, 0.95) 22%),
          rgba(23, 26, 22, 0.95);
        min-height: 580px;
        padding: 0;
      }
      .conversation-scroll {
        display: grid;
        gap: 14px;
        min-height: 340px;
        padding: 22px 22px 10px;
      }
      .assistant-empty-state {
        align-content: center;
        display: grid;
        gap: 16px;
        min-height: 300px;
      }
      .assistant-empty-copy {
        color: var(--ink);
        font-size: 18px;
        line-height: 1.5;
        margin: 0;
        max-width: 620px;
      }
      .message-bubble {
        border: 1px solid var(--line);
        border-radius: 18px;
        max-width: min(760px, 100%);
        padding: 16px 18px;
      }
      .message-user {
        background: rgba(139, 198, 183, 0.12);
        justify-self: end;
      }
      .message-assistant {
        background: rgba(255, 255, 255, 0.03);
      }
      .message-copy {
        color: var(--ink);
        font-size: 16px;
        line-height: 1.55;
        margin: 0;
        white-space: pre-wrap;
      }
      .assistant-composer {
        border-top: 1px solid var(--line);
        gap: 14px;
        padding: 18px 22px 22px;
      }
      .assistant-composer textarea {
        background: rgba(12, 15, 12, 0.85);
        border-radius: 18px;
        min-height: 132px;
        padding: 16px 18px;
      }
      .assistant-composer-actions {
        align-items: flex-end;
        display: flex;
        gap: 16px;
        justify-content: space-between;
      }
      .assistant-composer-actions .prompt-list {
        flex: 1;
      }
      .conversation-card-grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }
      .context-card {
        align-content: start;
        display: grid;
        gap: 12px;
      }
      .context-card h2 {
        margin-bottom: 0;
      }
      .context-card-head {
        align-items: center;
        display: flex;
        justify-content: space-between;
      }
      .context-card-summary {
        color: var(--ink);
        margin-bottom: 0;
      }
      .context-card-meta {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .context-card-meta div {
        background: var(--soft-panel);
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 10px 12px;
      }
      .context-card-meta dt {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }
      .context-card-meta dd {
        color: var(--ink);
        font-weight: 650;
        margin-top: 4px;
      }
      .compact-context-list {
        gap: 8px;
      }
      .assistant-rail {
        display: grid;
        gap: 14px;
        position: sticky;
        top: 32px;
      }
      .utility-card {
        background: rgba(23, 26, 22, 0.86);
      }
      .utility-links {
        display: grid;
        gap: 8px;
        margin-top: 14px;
      }
      .utility-links a {
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid var(--line);
        border-radius: 10px;
        color: var(--ink);
        display: grid;
        gap: 2px;
        padding: 10px 12px;
      }
      .utility-links a:hover {
        background: rgba(139, 198, 183, 0.12);
        text-decoration: none;
      }
      .utility-links small {
        color: var(--muted);
        font-size: 12px;
      }
      .compact-operator-actions form {
        padding-bottom: 10px;
      }
      @media (max-width: 780px) {
        header {
          border-bottom: 1px solid var(--line);
          border-right: 0;
          position: static;
          width: auto;
        }
        nav {
          min-height: 0;
          padding: 14px 16px;
        }
        .nav-primary,
        .nav-secondary {
          flex-direction: row;
          flex-wrap: wrap;
        }
        nav strong { margin-bottom: 4px; }
        main {
          margin-left: 0;
          padding: 24px 16px 42px;
          width: auto;
        }
        main { padding-top: 24px; }
        .assistant-shell,
        .ops-hero,
        .ops-grid {
          grid-template-columns: 1fr;
        }
        .assistant-rail {
          position: static;
          top: auto;
        }
        .assistant-composer-actions,
        .context-card-meta {
          display: grid;
          grid-template-columns: 1fr;
        }
        .briefing-hero {
          display: grid;
          align-items: start;
        }
        .summary-card {
          grid-template-columns: 1fr;
          padding: 18px;
        }
        .assessment-panel { grid-template-columns: 1fr; }
        .summary-meta { grid-template-columns: 1fr; }
        .briefing-grid { grid-template-columns: 1fr; }
        .attribution-triad { grid-template-columns: 1fr; }
        .briefing-card,
        .briefing-card:first-child,
        .briefing-card:nth-child(2) {
          grid-column: auto;
          min-height: 0;
        }
        .detail-list { grid-template-columns: 1fr; }
        .event-meta { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <strong>Olivaw</strong>
        <span class="nav-kicker">Utility Rail</span>
        <div class="nav-primary">
          <a href="/" class="{% if request.url.path == '/' %}active{% endif %}">Assistant</a>
          <a href="/sources" class="{% if request.url.path == '/sources' %}active{% endif %}">Sources</a>
          <a href="/settings" class="{% if request.url.path == '/settings' %}active{% endif %}">Settings</a>
          <a href="/health" class="{% if request.url.path == '/health' %}active{% endif %}">Health</a>
        </div>
        <div class="nav-secondary" aria-label="Secondary links">
          <a href="/chat" class="{% if request.url.path == '/chat' %}active{% endif %}">Conversation</a>
          <a href="/briefing" class="{% if request.url.path == '/briefing' %}active{% endif %}">Briefing</a>
          <a href="/config" class="{% if request.url.path == '/config' %}active{% endif %}">Config</a>
          <a href="/capabilities" class="{% if request.url.path == '/capabilities' %}active{% endif %}">Capabilities</a>
        </div>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
