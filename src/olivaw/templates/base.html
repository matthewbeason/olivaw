<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Olivaw</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f5f7;
        --ink: #1d1d1f;
        --muted: #6e6e73;
        --line: #d2d2d7;
        --panel: #ffffff;
        --soft-panel: #fbfbfd;
        --accent: #007aff;
        --green: #34c759;
        --orange: #ff9500;
        --purple: #af52de;
        --teal: #30b0c7;
        --warn: #c2410c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system,
          BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
        line-height: 1.45;
      }
      header {
        border-bottom: 1px solid var(--line);
        background: rgba(255, 255, 255, 0.82);
        backdrop-filter: blur(18px);
        position: sticky;
        top: 0;
        z-index: 1;
      }
      nav, main {
        width: min(1120px, calc(100vw - 32px));
        margin: 0 auto;
      }
      nav {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px 18px;
        min-height: 62px;
        padding: 8px 0;
      }
      nav strong {
        margin-right: auto;
        font-size: 17px;
        letter-spacing: 0;
      }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      main { padding: 32px 0 52px; }
      h1 {
        font-size: clamp(34px, 5vw, 54px);
        line-height: 1.04;
        margin: 0 0 10px;
        letter-spacing: 0;
      }
      h2 {
        font-size: 21px;
        line-height: 1.2;
        margin: 0 0 12px;
        letter-spacing: 0;
      }
      p { color: var(--muted); margin-top: 0; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 16px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }
      .source-grid {
        grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      }
      .source-output {
        margin-top: 12px;
      }
      code {
        overflow-wrap: anywhere;
        word-break: break-word;
      }
      .status {
        display: inline-block;
        border-radius: 999px;
        border: 1px solid var(--line);
        padding: 3px 9px;
        font-size: 13px;
      }
      .available { color: var(--accent); }
      .unavailable, .disabled { color: var(--warn); }
      pre {
        white-space: pre-wrap;
        background: #1c1c1e;
        color: #f5f5f7;
        border-radius: 8px;
        padding: 16px;
        overflow: auto;
        font-size: 13px;
        line-height: 1.55;
      }
      label { display: block; font-weight: 600; margin-bottom: 8px; }
      textarea {
        width: 100%;
        min-height: 140px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font: inherit;
      }
      button {
        margin-top: 10px;
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: white;
        padding: 10px 14px;
        font: inherit;
        font-weight: 650;
        cursor: pointer;
      }
      dl { display: grid; grid-template-columns: max-content 1fr; gap: 8px 14px; }
      dt { color: var(--muted); }
      dd { margin: 0; overflow-wrap: anywhere; }
      .briefing-hero {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        align-items: flex-end;
        margin-bottom: 20px;
      }
      .eyebrow, .card-label {
        color: var(--muted);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0;
        margin-bottom: 6px;
        text-transform: uppercase;
      }
      .lede {
        max-width: 620px;
        font-size: 18px;
        margin-bottom: 0;
      }
      .summary-card, .briefing-card, .disclosure-card {
        background: var(--panel);
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 8px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
      }
      .summary-card {
        display: grid;
        grid-template-columns: minmax(180px, 0.7fr) minmax(0, 1.3fr);
        gap: 20px;
        align-items: center;
        padding: 22px;
        margin-bottom: 16px;
      }
      .summary-card h2 { font-size: 28px; margin: 8px 0 0; }
      .status-pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        font-size: 14px;
        font-weight: 750;
        padding: 5px 11px;
      }
      .status-healthy {
        background: rgba(52, 199, 89, 0.14);
        color: #0f6b2f;
      }
      .status-watch {
        background: rgba(255, 149, 0, 0.16);
        color: #8a4b00;
      }
      .status-action {
        background: rgba(194, 65, 12, 0.13);
        color: var(--warn);
      }
      .status-explanation {
        max-width: 420px;
        margin: 8px 0 0;
      }
      .summary-meta {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }
      .summary-meta div {
        background: var(--soft-panel);
        border-radius: 8px;
        padding: 12px;
      }
      .summary-meta dt, .detail-list dt {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }
      .summary-meta dd {
        font-weight: 650;
        margin-top: 3px;
      }
      .assessment-panel {
        display: grid;
        grid-template-columns: minmax(0, 1.35fr) minmax(260px, 0.65fr);
        gap: 16px;
        margin-bottom: 18px;
      }
      .assessment-primary,
      .assessment-action,
      .briefing-section {
        background: var(--panel);
        border: 1px solid rgba(0, 0, 0, 0.08);
        border-radius: 8px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
      }
      .assessment-primary,
      .assessment-action {
        padding: 20px;
      }
      .assessment-primary h2 {
        font-size: 30px;
        margin: 10px 0 8px;
      }
      .assessment-primary p {
        color: #303033;
        font-size: 17px;
        margin: 0;
        max-width: 720px;
      }
      .health-review-panel {
        border-left: 4px solid #6a7a4f;
        background: #fbfcf8;
      }
      .generated-review {
        color: #303033;
        font-size: 17px;
        line-height: 1.5;
        margin: 0;
      }
      .action-copy {
        color: #303033;
        font-size: 19px;
        font-weight: 650;
        line-height: 1.4;
        margin: 0;
      }
      .briefing-flow {
        display: grid;
        gap: 16px;
      }
      .briefing-section {
        padding: 20px;
      }
      .section-heading {
        align-items: baseline;
        border-bottom: 1px solid var(--line);
        display: flex;
        flex-wrap: wrap;
        gap: 8px 14px;
        justify-content: space-between;
        margin-bottom: 14px;
        padding-bottom: 10px;
      }
      .section-heading h2,
      .section-heading .card-label {
        margin-bottom: 0;
      }
      .priority-list {
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      }
      .briefing-subhead {
        font-size: 15px;
        line-height: 1.25;
        margin: 14px 0 8px;
        letter-spacing: 0;
      }
      .action-list + .briefing-subhead {
        margin-top: 18px;
      }
      .action-list li span {
        color: var(--muted);
        display: block;
        font-size: 13px;
        margin-top: 2px;
      }
      .action-list li .unavailable-action {
        color: #303033;
        font-size: inherit;
        font-weight: 650;
      }
      .action-list li .action-helper {
        color: #7a4f00;
      }
      .compact-action-list {
        margin-top: 12px;
      }
      .explanation-meta {
        margin-bottom: 4px;
      }
      .detail-event {
        margin: 0 18px 18px;
      }
      .details-copy {
        margin: 0 18px 18px;
      }
      .nested-detail {
        margin: 0 18px 18px;
      }
      .briefing-grid {
        display: grid;
        grid-template-columns: repeat(6, 1fr);
        gap: 16px;
      }
      .briefing-card {
        grid-column: span 3;
        min-height: 220px;
        padding: 20px;
        position: relative;
        overflow: hidden;
      }
      .briefing-card:first-child { grid-column: span 4; }
      .briefing-card:nth-child(2) { grid-column: span 2; }
      .briefing-card::before {
        content: "";
        display: block;
        width: 42px;
        height: 5px;
        border-radius: 999px;
        background: var(--accent);
        margin-bottom: 18px;
      }
      .accent-green::before { background: var(--green); }
      .accent-blue::before { background: var(--accent); }
      .accent-teal::before { background: var(--teal); }
      .accent-orange::before { background: var(--orange); }
      .accent-purple::before { background: var(--purple); }
      .accent-red::before { background: var(--warn); }
      .category-chip {
        display: inline-flex;
        border: 1px solid var(--line);
        border-radius: 999px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 650;
        margin-bottom: 14px;
        padding: 4px 9px;
      }
      .clean-list {
        display: grid;
        gap: 10px;
        list-style: none;
        margin: 0;
        padding: 0;
      }
      .clean-list li {
        color: #303033;
        overflow-wrap: anywhere;
      }
      .clean-list li::before {
        content: "";
        display: inline-block;
        width: 7px;
        height: 7px;
        margin-right: 8px;
        border-radius: 50%;
        background: var(--line);
        vertical-align: 1px;
      }
      .card-copy {
        color: #303033;
        font-size: 17px;
        line-height: 1.5;
      }
      .event-card {
        grid-column: span 6;
      }
      .event-item {
        border-top: 1px solid var(--line);
        padding-top: 14px;
      }
      .event-item + .event-item {
        margin-top: 16px;
      }
      .event-item h3 {
        font-size: 18px;
        line-height: 1.3;
        margin: 0 0 12px;
        letter-spacing: 0;
      }
      .event-meta {
        display: grid;
        grid-template-columns: minmax(130px, max-content) minmax(0, 1fr);
        gap: 8px 12px;
      }
      .event-meta dt {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }
      .event-meta dd {
        color: #303033;
        font-weight: 500;
      }
      .attribution-triad {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin: 0 0 14px;
      }
      .attribution-triad div {
        background: var(--soft-panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
      }
      .attribution-triad dt {
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }
      .attribution-triad dd {
        color: #303033;
        font-weight: 650;
        margin-top: 2px;
      }
      .details-stack {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }
      .inline-details {
        border-top: 1px solid var(--line);
        margin-top: 16px;
        padding-top: 12px;
      }
      .inline-details summary {
        color: var(--accent);
        cursor: pointer;
        font-weight: 700;
      }
      .detail-items {
        margin-top: 12px;
        padding: 0 18px 18px;
      }
      .detail-list-body {
        padding: 0 18px 18px;
      }
      .disclosure-footnote {
        padding: 0 18px 18px;
      }
      .disclosure-subhead {
        padding: 0 18px;
      }
      .source-footnote {
        color: var(--muted);
        font-size: 13px;
        margin: 12px 0 0;
      }
      .disclosure-card {
        padding: 0;
        overflow: hidden;
      }
      .disclosure-card summary {
        cursor: pointer;
        font-weight: 700;
        padding: 16px 18px;
      }
      .disclosure-card pre {
        margin: 0 16px 16px;
      }
      .detail-list {
        display: grid;
        grid-template-columns: minmax(110px, max-content) 1fr;
        gap: 10px 14px;
        padding: 0 18px 18px;
      }
      @media (max-width: 780px) {
        nav { align-items: flex-start; }
        nav strong { flex-basis: 100%; }
        main { padding-top: 24px; }
        .briefing-hero {
          display: grid;
          align-items: start;
        }
        .summary-card {
          grid-template-columns: 1fr;
          padding: 18px;
        }
        .assessment-panel { grid-template-columns: 1fr; }
        .summary-meta { grid-template-columns: 1fr; }
        .briefing-grid { grid-template-columns: 1fr; }
        .attribution-triad { grid-template-columns: 1fr; }
        .briefing-card,
        .briefing-card:first-child,
        .briefing-card:nth-child(2) {
          grid-column: auto;
          min-height: 0;
        }
        .detail-list { grid-template-columns: 1fr; }
        .event-meta { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <strong>Olivaw</strong>
        <a href="/">Home</a>
        <a href="/chat">Chat</a>
        <a href="/briefing">Briefing</a>
        <a href="/sources">Sources</a>
        <a href="/capabilities">Capabilities</a>
        <a href="/health">Health</a>
        <a href="/config">Config</a>
        <a href="/settings">Settings</a>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
