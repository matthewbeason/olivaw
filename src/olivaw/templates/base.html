<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Olivaw</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f7f2;
        --ink: #202124;
        --muted: #5f6368;
        --line: #d8d7ce;
        --panel: #ffffff;
        --accent: #0f766e;
        --warn: #9a3412;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--ink);
      }
      header {
        border-bottom: 1px solid var(--line);
        background: var(--panel);
      }
      nav, main {
        width: min(1080px, calc(100vw - 32px));
        margin: 0 auto;
      }
      nav {
        display: flex;
        align-items: center;
        gap: 18px;
        min-height: 58px;
      }
      nav strong { margin-right: auto; }
      a { color: var(--accent); text-decoration: none; }
      a:hover { text-decoration: underline; }
      main { padding: 28px 0 44px; }
      h1 { font-size: 30px; line-height: 1.15; margin: 0 0 16px; }
      h2 { font-size: 18px; margin: 28px 0 10px; }
      p { color: var(--muted); }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 14px;
      }
      .card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }
      .status {
        display: inline-block;
        border-radius: 999px;
        border: 1px solid var(--line);
        padding: 3px 9px;
        font-size: 13px;
      }
      .available { color: var(--accent); }
      .unavailable, .disabled { color: var(--warn); }
      pre {
        white-space: pre-wrap;
        background: #101828;
        color: #f9fafb;
        border-radius: 8px;
        padding: 16px;
        overflow: auto;
      }
      label { display: block; font-weight: 600; margin-bottom: 8px; }
      textarea {
        width: 100%;
        min-height: 140px;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        font: inherit;
      }
      button {
        margin-top: 10px;
        border: 0;
        border-radius: 8px;
        background: var(--accent);
        color: white;
        padding: 10px 14px;
        font: inherit;
        cursor: pointer;
      }
      dl { display: grid; grid-template-columns: max-content 1fr; gap: 8px 14px; }
      dt { color: var(--muted); }
      dd { margin: 0; overflow-wrap: anywhere; }
    </style>
  </head>
  <body>
    <header>
      <nav>
        <strong>Olivaw</strong>
        <a href="/">Home</a>
        <a href="/chat">Chat</a>
        <a href="/capabilities">Capabilities</a>
        <a href="/health">Health</a>
        <a href="/settings">Settings</a>
      </nav>
    </header>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
