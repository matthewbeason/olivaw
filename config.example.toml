[providers.local]
type = "ollama"
base_url = "http://localhost:11434"
model = "llama3.1:8b"
keep_alive = "5m"
num_ctx = 4096
num_predict = 128

[providers.cloud]
type = "openai"
enabled = false
model = "gpt-4.1-mini"

[policy]
cloud_fallback = "disabled"

[sources.files]
directory = "~/Library/Application Support/Olivaw/data"
max_bytes = 1048576

[sources.prime_observer]
directory = "~/prime-observer/viz"
enabled = true
# Optional. Use when Prime Observer serves its viz directory over HTTP.
# base_url = "http://127.0.0.1:8000"

[sources.core_signal]
directory = "~/core-signal/reports"
enabled = true

[secrets]
# Replace with a real key in your user config file only:
# ~/Library/Application Support/Olivaw/config.toml
openai_api_key = ""
