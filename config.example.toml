[providers.local]
type = "ollama"
base_url = "http://localhost:11434"
model = "llama3.1:8b"

[providers.cloud]
type = "openai"
enabled = false
model = "gpt-4.1-mini"

[policy]
cloud_fallback = "disabled"

[sources.files]
directory = "~/Library/Application Support/Olivaw/data"
max_bytes = 1048576

[sources.prime_observer]
directory = "~/prime-observer/viz"
enabled = true

[sources.core_signal]
directory = "~/core-signal/reports"
enabled = true

[secrets]
# Replace with a real key in your user config file only:
# ~/Library/Application Support/Olivaw/config.toml
openai_api_key = ""
